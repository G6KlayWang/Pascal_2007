experiment:
  name: pascal_voc_deeplabv3
  run_name: deeplabv3-default
  output_root: outputs
  seed: 42
  device:
dataset:
  root: data
  download: true
  image_size: 1024
  num_workers: 8
  internal_val_ratio: 0.1
  split_seed: 42
model:
  type: deeplabv3
  pretrained: true
train:
  epochs: 55
  batch_size: 8
  accum_steps: 1
  optimizer: adamw
  lr: 0.0005
  backbone_lr: 0.0005
  weight_decay: 0.0001
  warmup_epochs: 3
  early_stopping_patience: 8
  min_epochs_before_stopping: 55
  early_stopping_min_delta: 0.0002
  amp: true
  grad_clip: 1.0
  use_ema: true
  ema_decay: 0.999
loss:
  name: ce
  use_class_weights: false
augmentation:
  enabled: true
eval:
  batch_size: 4
  best_worst_class: person
