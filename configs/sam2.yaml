experiment:
  name: pascal_voc_sam2
  run_name: sam2-default
  output_root: outputs
  seed: 42
  device:
dataset:
  root: data
  download: true
  image_size: 384
  num_workers: 2
  internal_val_ratio: 0.1
  split_seed: 42
model:
  type: sam2
  sam2_config: sam2_configs/sam2.1_hiera_l.yaml
  sam2_checkpoint: checkpoints/sam2.1_hiera_large.pt
  freeze_backbone: true
train:
  epochs: 50
  batch_size: 1
  accum_steps: 4
  optimizer: adamw
  lr: 0.0002
  backbone_lr: 0.00002
  weight_decay: 0.0001
  warmup_epochs: 5
  early_stopping_patience: 15
  min_epochs_before_stopping: 20
  early_stopping_min_delta: 0.0002
  amp: true
  grad_clip: 1.0
  use_ema: true
  ema_decay: 0.999
loss:
  name: ce_dice
  ce_weight: 2.0
  dice_weight: 1.0
  use_class_weights: true
  class_weight_power: 0.5
  class_weight_clip_max: 8.0
augmentation:
  enabled: true
eval:
  batch_size: 2
  best_worst_class: person
