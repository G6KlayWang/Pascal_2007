experiment:
  name: pascal_voc_sam2
  run_name: sam2-default
  output_root: outputs
  seed: 42
  device:
dataset:
  root: data
  download: true
  image_size: 512
  num_workers: 12
  internal_val_ratio: 0.1
  split_seed: 42
model:
  type: sam2
  sam2_config: ./sam2_configs/sam2.1_hiera_l.yaml
  sam2_checkpoint: ./checkpoints/sam2.1_hiera_large.pt
  freeze_backbone: true
  unfreeze_patterns:
    - image_encoder.trunk.blocks.10
    - image_encoder.trunk.blocks.11
    - image_encoder.trunk.neck
train:
  epochs: 80
  batch_size: 8
  accum_steps: 1
  optimizer: adamw
  decoder_lr: 0.0005
  backbone_lr: 0.00005
  weight_decay: 0.0001
  warmup_epochs: 10
  early_stopping_patience: 25
  min_epochs_before_stopping: 50
  early_stopping_min_delta: 0.0002
  amp: true
  grad_clip: 1.0
  use_ema: true
  ema_decay: 0.999
loss:
  name: ce_dice
  ce_weight: 1.0
  dice_weight: 2.0
  use_class_weights: false
augmentation:
  enabled: true
eval:
  batch_size: 2
  best_worst_class: person
